        async function compressImage(base64Str) {
            return new Promise((resolve) => {
                const img = new Image(); img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    const max_size = 800;
                    if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } }
                    else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
            });
        }

        function openPhotoAdjustModal() { resetModal(); document.getElementById('modal-title').innerText = "ì‚¬ì§„ íŽ¸ì§‘"; document.getElementById('photo-adjust-fields').classList.remove('hidden'); const s = JSON.parse(localStorage.getItem('p_set_v34')) || {z:1, x:50, y:50}; document.getElementById('zoom-slider').value = s.z; document.getElementById('x-slider').value = s.x; document.getElementById('y-slider').value = s.y; document.getElementById('btn-save').onclick = () => { applyPhotoSettings(); closeModal(); }; document.getElementById('master-modal').style.display = 'flex'; }
        async function handleMainPhoto(input) { if(input.files && input.files[0]) { const r = new FileReader(); r.readAsDataURL(input.files[0]); r.onload = async (e) => { const compressed = await compressImage(e.target.result); document.getElementById('main-photo').src = compressed; localStorage.setItem('main_p_v34', compressed); }; } }

        function renderSch() {
            const grid = document.getElementById('sch-grid'); if(!grid) return;
            grid.innerHTML = ""; const y = curViewDate.getFullYear(), m = curViewDate.getMonth();
            document.getElementById('sch-label').innerText = `${y}ë…„ ${m+1}ì›”`;
            ['S','M','T','W','T','F','S'].forEach(d => grid.innerHTML += `<div class="cal-day-header">${d}</div>`);
            const first = new Date(y, m, 1).getDay(), last = new Date(y, m+1, 0).getDate();
            for(let i=0; i<first; i++) grid.innerHTML += `<div class="cal-cell" style="background:#fcfcfc;"></div>`;
            for(let d=1; d<=last; d++) {
                const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const mKey = `${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const cell = document.createElement('div'); cell.className = 'cal-cell';
                const dayW = new Date(y, m, d).getDay();
                let dColor = (dayW === 0 || holidays[mKey]) ? 'var(--danger)' : (dayW === 6 ? 'var(--primary)' : 'inherit');
                let html = `<div class="date-num" style="color:${dColor}">${d}`;
                if(dayW === 0) html += `<span class="lunar-small">(${(d+12)%30||30})</span>`;
                if(holidays[mKey]) html += `<span class="holiday-label">${holidays[mKey]}</span>`;
                if(specialDays[mKey]) html += `<span class="national-label">${specialDays[mKey]}</span>`;
                html += `</div>`; cell.innerHTML = html;
                schData.filter(s => s.date === ds).forEach(ev => {
                    const bar = document.createElement('div'); bar.className = 'event-bar';
                    bar.style.backgroundColor = ev.member === 'ì •ìš°ì„¤' ? 'var(--ws-bg)' : ev.member === 'í•œë¯¸ì—°' ? 'var(--hm-bg)' : '#f1f5f9';
                    bar.innerText = ev.memo; bar.onclick = (e) => { e.stopPropagation(); openSchModal(ev, ds); }; cell.appendChild(bar);
                });
                cell.onclick = () => openSchModal(null, ds); grid.appendChild(cell);
            }
        }

        function openSchModal(data, date) { resetModal(); document.getElementById('modal-title').innerText = data ? "ì¼ì • ìˆ˜ì •" : "ë“±ë¡"; document.getElementById('sch-fields').classList.remove('hidden'); activeDateStr = date; if(data) { document.getElementById('edit-id').value = data.id; document.getElementById('sch-member').value = data.member; document.getElementById('sch-memo').value = data.memo; document.getElementById('btn-del').classList.remove('hidden'); } document.getElementById('btn-save').onclick = async () => { const id = document.getElementById('edit-id').value || "sch_" + Date.now(); await db.collection("schedules").doc(id).set({ id, date: activeDateStr, member: document.getElementById('sch-member').value, memo: document.getElementById('sch-memo').value, category: 'ì¼ë°˜' }); closeModal(); }; document.getElementById('btn-del').onclick = async () => { if(confirm("ì‚­ì œ?")) { await db.collection("schedules").doc(document.getElementById('edit-id').value).delete(); closeModal(); } }; document.getElementById('master-modal').style.display = 'flex'; }
        
        /* [í•µì‹¬ ìˆ˜ì •] ì—¬í–‰&ì—¬ê°€ ëª¨ë‹¬ ì „ìš© ë¡œì§ */
        function openPlanModal() {

            document.getElementById('plan-fields').classList.remove('hidden');

            togglePlanSub(); // í•„ë“œ ê°€ì‹œì„± ì¦‰ì‹œ ì ìš©
            document.getElementById('btn-save').onclick = savePlan;

        function togglePlanSub() {

            if(t === 'ì—¬í–‰') {

        function generateDayInputs() { const start = document.getElementById('plan-start-date').value, end = document.getElementById('plan-end-date').value, wrap = document.getElementById('day-schedule-wrap'); wrap.innerHTML = ""; if(start && end && new Date(end) >= new Date(start)) { for(let i=0; i <= Math.floor((new Date(end)-new Date(start))/86400000); i++) wrap.innerHTML += `<label class="field-label">Day ${i+1} ì¼ì •</label><input type="text" class="day-input">`; } }
        async function savePlan() { const planId = "p_" + Date.now(); const mType = document.getElementById('plan-main-type').value, subType = document.getElementById('plan-sub-type').value, loc = document.getElementById('plan-loc').value, supplies = document.getElementById('plan-supplies').value; const batch = db.batch(); if(mType === 'ì—¬í–‰') { const start = document.getElementById('plan-start-date').value; document.querySelectorAll('.day-input').forEach((input, idx) => { let d = new Date(start); d.setDate(d.getDate() + idx); batch.set(db.collection("schedules").doc("sch_"+planId+idx), { planId, date: d.toISOString().split('T')[0], category: 'ì—¬í–‰', member: 'ê°€ì¡±', memo: `[${subType}] ${loc}: ${input.value}` }); }); batch.set(db.collection("plans").doc(planId), { id: planId, mType, subType, loc, start, supplies }); } else { const time = document.getElementById('plan-leisure-time').value; batch.set(db.collection("schedules").doc("sch_"+planId), { planId, date: time.split('T')[0], category: 'ì—¬ê°€', member: 'ê°€ì¡±', memo: `[${subType}] ${loc}` }); batch.set(db.collection("plans").doc(planId), { id: planId, mType, subType, loc, time, supplies }); } await batch.commit(); closeModal(); }
        function renderPlans() { const c = document.getElementById('plan-list-container'); c.innerHTML = planData.map(p => `<div class="card" style="padding:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:flex-start;"><div><b>[${p.mType}] ${p.loc}</b><br><small>${p.start||p.time.split('T')[0]}</small></div><button class="btn-action btn-danger" style="min-width:60px; height:35px; font-size:12px;" onclick="deletePlan('${p.id}')">ì‚­ì œ</button></div>`).join(''); }
        async function deletePlan(id) { if(!confirm("ì‚­ì œ?")) return; const batch = db.batch(); const schs = await db.collection("schedules").where("planId", "==", id).get(); schs.docs.forEach(d => batch.delete(d.ref)); batch.delete(db.collection("plans").doc(id)); await batch.commit(); }
        
        function openPersonalAsset(n) { currentMember = n; showSection('asset-cal-section'); renderAssetCal(); }
        function renderAssetCal() { const grid = document.getElementById('asset-cal-grid'); grid.innerHTML = ""; const y = curViewDate.getFullYear(), m = curViewDate.getMonth(); document.getElementById('asset-cal-title').innerText = `${currentMember} - ${y}ë…„ ${m+1}ì›”`; ['S','M','T','W','T','F','S'].forEach(d => grid.innerHTML += `<div class="cal-day-header">${d}</div>`); const first = new Date(y, m, 1).getDay(), last = new Date(y, m+1, 0).getDate(); for(let i=0; i<first; i++) grid.innerHTML += `<div class="cal-cell"></div>`; for(let d=1; d<=last; d++) { const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; const cell = document.createElement('div'); cell.className = 'cal-cell'; cell.innerHTML = `<strong>${d}</strong>`; (assetData[currentMember]||[]).filter(e => e.date === ds).forEach(e => { const b = document.createElement('div'); b.className = 'event-bar'; b.style.backgroundColor = e.type==='ìˆ˜ìž…'?'#ecfdf5':'#fef2f2'; b.innerText = Number(e.amt).toLocaleString(); b.onclick=(ev)=>{ev.stopPropagation(); openAssetEntryModal(e, ds);}; cell.appendChild(b); }); cell.onclick = () => openAssetEntryModal(null, ds); grid.appendChild(cell); } }
        function openAssetEntryModal(data, date) { resetModal(); document.getElementById('modal-title').innerText = "ì €ìž¥"; document.getElementById('asset-entry-fields').classList.remove('hidden'); activeDateStr = date; if(data) { document.getElementById('edit-id').value = data.id; document.getElementById('as-type').value = data.type; document.getElementById('as-amt').value = data.amt; document.getElementById('as-memo').value = data.memo; document.getElementById('btn-del').classList.remove('hidden'); } document.getElementById('btn-save').onclick = async () => { const id = document.getElementById('edit-id').value || "as_"+Date.now(); await db.collection("assets").doc(id).set({ id, member: currentMember, date: activeDateStr, type: document.getElementById('as-type').value, amt: Number(document.getElementById('as-amt').value), memo: document.getElementById('as-memo').value }); closeModal(); renderAssetCal(); }; document.getElementById('btn-del').onclick = async () => { if(confirm("ì‚­ì œ?")) { await db.collection("assets").doc(document.getElementById('edit-id').value).delete(); closeModal(); renderAssetCal(); } }; document.getElementById('master-modal').style.display = 'flex'; }

        function renderFolders() { const c = document.getElementById('folder-container'); c.innerHTML = albumData.map(f => `<div class="folder-card" onclick="openFolderDetail('${f.id}')"><div style="font-size:40px; padding:20px; background:#f1f5f9;">ðŸ“</div><div style="padding:10px;"><b>${f.name}</b></div></div>`).join(''); }
        function openFolderDetail(id) { currentFolderId = id; document.getElementById('photo-main-view').classList.add('hidden'); document.getElementById('photo-detail-view').classList.remove('hidden'); const f = albumData.find(x => x.id===id); if(f) { document.getElementById('detail-folder-title').innerText = f.name; renderGallery(); } }

        function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').style.display = 'flex'; }
        async function deleteSinglePhoto(idx) { if(!confirm("ì‚­ì œ?")) return; const f = albumData.find(x => x.id === currentFolderId); if(f) { f.photos.splice(idx, 1); await db.collection("albums").doc(currentFolderId).update({ photos: f.photos }); renderGallery(); } }
        async function handleGalleryUpload(input) { if(input.files && currentFolderId) { const f = albumData.find(x => x.id === currentFolderId); for(let file of Array.from(input.files)) { const r = new FileReader(); r.readAsDataURL(file); r.onload = async(e) => { const compressed = await compressImage(e.target.result); f.photos.push(compressed); await db.collection("albums").doc(currentFolderId).update({ photos: f.photos }); renderGallery(); }; } input.value = ""; } }
        function openFolderModal() { resetModal(); document.getElementById('folder-fields').classList.remove('hidden'); document.getElementById('modal-title').innerText = "í´ë” ìƒì„±"; document.getElementById('btn-save').onclick = async() => { const name = document.getElementById('fold-name').value; if(name) { const id = "f_"+Date.now(); await db.collection("albums").doc(id).set({ id, name, photos: [] }); closeModal(); } }; document.getElementById('master-modal').style.display = 'flex'; }
